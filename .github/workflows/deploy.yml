name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Canonical site URL for canonical/OG tags. Set as a repo Variable
      # (Settings -> Secrets and variables -> Actions -> Variables) named
      # PUBLIC_SITE_URL (e.g. https://ai.wombatepiclanding.studio). Falls back
      # to the default *.github.io URL when unset, so the domain is never
      # hardcoded in source.
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v7

      - name: Install, build, and upload your site
        uses: withastro/action@v6
        with:
          path: _astro

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
